<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Masuk — WedInvite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --navy:#0a0a1a; --navy-light:#141428; --navy-mid:#1e1e3f;
  --gold:#c9a96e; --gold-light:#e8d5b0; --gold-bright:#f0d78c;
  --cream:#faf7f2; --white:#fff; --gray:#8a8a9a; --gray-light:#e8e8ee;
  --success:#22c55e; --error:#ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; display:flex; flex-direction:column; }

/* ============ TOPBAR ============ */
.topbar { background:var(--navy-light); border-bottom:1px solid rgba(201,169,110,.1); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.topbar-back { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--white); font-size:14px; font-weight:600; transition:color .3s; }
.topbar-back:hover { color:var(--gold); }
.topbar-back svg { width:20px; height:20px; }
.topbar-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; }

/* ============ AUTH CONTAINER ============ */
.auth-container { max-width:460px; margin:0 auto; padding:48px 24px 80px; width:100%; }
.auth-header { text-align:center; margin-bottom:36px; }
.auth-brand { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:var(--gold); letter-spacing:1px; margin-bottom:8px; }
.auth-brand span { color:var(--white); font-weight:400; }
.auth-subtitle { font-size:15px; color:var(--gray); }

/* ============ TABS ============ */
.auth-tabs { display:flex; background:var(--navy-light); border-radius:12px; padding:4px; margin-bottom:32px; border:1px solid rgba(201,169,110,.1); }
.auth-tab { flex:1; padding:12px; text-align:center; font-size:14px; font-weight:600; color:var(--gray); cursor:pointer; border-radius:10px; transition:all .3s; border:none; background:none; font-family:'Inter',sans-serif; }
.auth-tab.active { background:linear-gradient(135deg, var(--gold), #b8944f); color:var(--navy); }

/* ============ FORM ============ */
.auth-form { display:none; }
.auth-form.active { display:block; animation:fadeIn .4s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:13px; font-weight:600; color:var(--white); margin-bottom:8px; }
.form-label span { color:var(--gold); }
.form-input { width:100%; padding:14px 16px; background:var(--navy-light); border:1.5px solid rgba(255,255,255,.1); border-radius:12px; font-size:14px; color:var(--white); font-family:'Inter',sans-serif; transition:all .3s; }
.form-input:focus { outline:none; border-color:var(--gold); background:var(--navy-mid); }
.form-input::placeholder { color:var(--gray); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

.form-options { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; font-size:13px; }
.form-remember { display:flex; align-items:center; gap:8px; color:var(--gray); cursor:pointer; }
.form-remember input { accent-color:var(--gold); width:16px; height:16px; cursor:pointer; }
.form-forgot { color:var(--gold); text-decoration:none; font-weight:500; transition:opacity .3s; }
.form-forgot:hover { opacity:.8; }

.btn-submit { width:100%; padding:16px; background:linear-gradient(135deg, var(--gold), #b8944f); color:var(--navy); border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .3s; letter-spacing:.3px; }
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(201,169,110,.3); }
.btn-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* ============ DIVIDER ============ */
.auth-divider { display:flex; align-items:center; gap:16px; margin:28px 0; color:var(--gray); font-size:13px; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.08); }

/* ============ GOOGLE BUTTON ============ */
.btn-google { width:100%; padding:14px; background:var(--white); color:var(--navy); border:none; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .3s; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn-google:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,255,255,.1); }
.btn-google svg { width:20px; height:20px; }

/* ============ FOOTER LINK ============ */
.auth-footer { text-align:center; margin-top:24px; font-size:14px; color:var(--gray); }
.auth-footer a { color:var(--gold); text-decoration:none; font-weight:600; cursor:pointer; }
.auth-footer a:hover { text-decoration:underline; }

/* ============ TOAST ============ */
.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--navy-light); color:var(--gold); padding:14px 28px; border-radius:12px; font-size:14px; font-weight:700; z-index:300; opacity:0; transition:all .4s; box-shadow:0 8px 30px rgba(0,0,0,.3); border:1px solid rgba(201,169,110,.2); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error { color:var(--error); border-color:rgba(239,68,68,.2); }
.toast.success { color:var(--success); border-color:rgba(34,197,94,.2); }

/* ============ USER CARD PREVIEW ============ */
.user-card { background:var(--navy-light); border:1px solid rgba(201,169,110,.15); border-radius:16px; padding:20px; margin-bottom:24px; display:none; align-items:center; gap:16px; }
.user-card.show { display:flex; animation:fadeIn .4s; }
.user-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid var(--gold); }
.user-info { flex:1; }
.user-name { font-size:15px; font-weight:700; color:var(--white); }
.user-email { font-size:13px; color:var(--gray); }

/* ============ LOADING SPINNER ============ */
.spinner { width:18px; height:18px; border:2px solid rgba(10,10,26,.2); border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; display:none; }
.spinner.show { display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ============ RESPONSIVE ============ */
@media (max-width:640px) {
  .auth-container { padding:32px 20px 80px; }
  .form-row { grid-template-columns:1fr; }
  .topbar { padding:16px 20px; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a href="index.html" class="topbar-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Beranda
  </a>
  <div class="topbar-title">Masuk</div>
  <div style="width:60px;"></div>
</div>

<!-- Auth Container -->
<div class="auth-container">
  <div class="auth-header">
    <div class="auth-brand">Wed<span>Invite</span></div>
    <p class="auth-subtitle">Masuk atau daftar untuk mulai membuat undangan pernikahan digital Anda</p>
  </div>

  <!-- Google User Card (shown after Google sign-in) -->
  <div class="user-card" id="userCard">
    <img src="" alt="Avatar" class="user-avatar" id="userAvatar">
    <div class="user-info">
      <div class="user-name" id="userName"></div>
      <div class="user-email" id="userEmail"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')" id="tabLogin">Masuk</button>
    <button class="auth-tab" onclick="switchTab('register')" id="tabRegister">Daftar</button>
  </div>

  <!-- Login Form -->
  <form class="auth-form active" id="formLogin" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Email <span>*</span></label>
      <input type="email" class="form-input" placeholder="nama@email.com" id="loginEmail" required>
    </div>
    <div class="form-group">
      <label class="form-label">Kata Sandi <span>*</span></label>
      <input type="password" class="form-input" placeholder="••••••••" id="loginPassword" required>
    </div>
    <div class="form-options">
      <label class="form-remember">
        <input type="checkbox" id="loginRemember"> Ingat saya
      </label>
      <a href="#" class="form-forgot" onclick="showToast('📧 Link reset kata sandi telah dikirim ke email Anda')">Lupa kata sandi?</a>
    </div>
    <button type="submit" class="btn-submit" id="btnLogin">
      <span class="spinner" id="spinnerLogin"></span>
      <span id="textLogin">Masuk</span>
    </button>
  </form>

  <!-- Register Form -->
  <form class="auth-form" id="formRegister" onsubmit="handleRegister(event)">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nama Depan <span>*</span></label>
        <input type="text" class="form-input" placeholder="Contoh: Ican" id="regFirstName" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nama Belakang</label>
        <input type="text" class="form-input" placeholder="Contoh: Pratama" id="regLastName">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email <span>*</span></label>
      <input type="email" class="form-input" placeholder="nama@email.com" id="regEmail" required>
    </div>
    <div class="form-group">
      <label class="form-label">Nomor WhatsApp <span>*</span></label>
      <input type="tel" class="form-input" placeholder="0812-3456-7890" id="regPhone" required>
    </div>
    <div class="form-group">
      <label class="form-label">Kata Sandi <span>*</span></label>
      <input type="password" class="form-input" placeholder="Minimal 8 karakter" id="regPassword" minlength="8" required>
    </div>
    <div class="form-group">
      <label class="form-label">Konfirmasi Kata Sandi <span>*</span></label>
      <input type="password" class="form-input" placeholder="Ulangi kata sandi" id="regConfirmPassword" required>
    </div>
    <button type="submit" class="btn-submit" id="btnRegister">
      <span class="spinner" id="spinnerRegister"></span>
      <span id="textRegister">Buat Akun</span>
    </button>
    <p style="font-size:12px; color:var(--gray); margin-top:16px; text-align:center;">Dengan mendaftar, Anda menyetujui <a href="#" style="color:var(--gold);">Syarat & Ketentuan</a> dan <a href="#" style="color:var(--gold);">Kebijakan Privasi</a> kami.</p>
  </form>

  <!-- Divider -->
  <div class="auth-divider">atau</div>

  <!-- Google Sign-In Button -->
  <button class="btn-google" onclick="handleGoogleSignIn()" id="btnGoogle">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Lanjutkan dengan Google
  </button>

  <!-- Hidden Google Sign-In container -->
  <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleGoogleCredentialResponse" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" style="display:none;"></div>

  <!-- Footer -->
  <div class="auth-footer" id="footerLogin">
    Belum punya akun? <a onclick="switchTab('register')">Daftar sekarang</a>
  </div>
  <div class="auth-footer" id="footerRegister" style="display:none;">
    Sudah punya akun? <a onclick="switchTab('login')">Masuk di sini</a>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== TOAST =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== TAB SWITCHING =====
function switchTab(tab) {
  const loginForm = document.getElementById('formLogin');
  const registerForm = document.getElementById('formRegister');
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const footerLogin = document.getElementById('footerLogin');
  const footerRegister = document.getElementById('footerRegister');

  if (tab === 'login') {
    loginForm.classList.add('active');
    registerForm.classList.remove('active');
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    footerLogin.style.display = 'block';
    footerRegister.style.display = 'none';
    document.querySelector('.topbar-title').textContent = 'Masuk';
  } else {
    loginForm.classList.remove('active');
    registerForm.classList.add('active');
    tabLogin.classList.remove('active');
    tabRegister.classList.add('active');
    footerLogin.style.display = 'none';
    footerRegister.style.display = 'block';
    document.querySelector('.topbar-title').textContent = 'Daftar';
  }
}

// ===== LOGIN HANDLER =====
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('btnLogin');
  const spinner = document.getElementById('spinnerLogin');
  const text = document.getElementById('textLogin');

  // Simulate loading
  btn.disabled = true;
  spinner.classList.add('show');
  text.textContent = 'Memuat...';

  setTimeout(() => {
    // Store session
    const user = {
      email: email,
      name: email.split('@')[0],
      avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(email.split('@')[0]) + '&background=c9a96e&color=0a0a1a&size=128',
      loginMethod: 'email',
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('wedinvite_user', JSON.stringify(user));

    showToast('✅ Berhasil masuk! Selamat datang kembali.', 'success');
    setTimeout(() => {
      redirectAfterAuth();
    }, 1200);
  }, 1500);
}

// ===== REGISTER HANDLER =====
function handleRegister(e) {
  e.preventDefault();
  const firstName = document.getElementById('regFirstName').value;
  const lastName = document.getElementById('regLastName').value;
  const email = document.getElementById('regEmail').value;
  const phone = document.getElementById('regPhone').value;
  const password = document.getElementById('regPassword').value;
  const confirmPassword = document.getElementById('regConfirmPassword').value;
  const btn = document.getElementById('btnRegister');
  const spinner = document.getElementById('spinnerRegister');
  const text = document.getElementById('textRegister');

  // Validation
  if (password !== confirmPassword) {
    showToast('⚠️ Kata sandi tidak cocok!', 'error');
    return;
  }
  if (password.length < 8) {
    showToast('⚠️ Kata sandi minimal 8 karakter!', 'error');
    return;
  }

  // Simulate loading
  btn.disabled = true;
  spinner.classList.add('show');
  text.textContent = 'Mendaftarkan...';

  setTimeout(() => {
    const fullName = firstName + (lastName ? ' ' + lastName : '');
    const user = {
      email: email,
      name: fullName,
      phone: phone,
      avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(fullName) + '&background=c9a96e&color=0a0a1a&size=128',
      loginMethod: 'email',
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('wedinvite_user', JSON.stringify(user));

    showToast('✅ Akun berhasil dibuat! Selamat datang di WedInvite.', 'success');
    setTimeout(() => {
      redirectAfterAuth();
    }, 1500);
  }, 1800);
}

// ===== GOOGLE SIGN-IN =====
function handleGoogleSignIn() {
  // Trigger the hidden Google Sign-In button
  const googleBtn = document.querySelector('.g_id_signin > div[role=button]');
  if (googleBtn) {
    googleBtn.click();
  } else {
    // Fallback: simulate Google login for demo
    simulateGoogleLogin();
  }
}

function simulateGoogleLogin() {
  const btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner show" style="border-color:rgba(10,10,26,.2);border-top-color:var(--navy);display:inline-block;"></span> Menghubungkan...';

  setTimeout(() => {
    const mockGoogleUser = {
      email: 'pengguna@gmail.com',
      name: 'Pengguna Google',
      avatar: 'https://ui-avatars.com/api/?name=Pengguna+Google&background=c9a96e&color=0a0a1a&size=128',
      loginMethod: 'google',
      timestamp: new Date().toISOString()
    };
    localStorage.setItem('wedinvite_user', JSON.stringify(mockGoogleUser));

    showToast('✅ Berhasil masuk dengan Google!', 'success');
    setTimeout(() => {
      redirectAfterAuth();
    }, 1200);
  }, 1500);
}

// ===== GOOGLE CREDENTIAL RESPONSE =====
function handleGoogleCredentialResponse(response) {
  // Decode JWT token from Google
  const credential = response.credential;
  const payload = JSON.parse(atob(credential.split('.')[1]));

  const user = {
    email: payload.email,
    name: payload.name || payload.given_name + ' ' + payload.family_name,
    avatar: payload.picture || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(payload.name) + '&background=c9a96e&color=0a0a1a&size=128',
    loginMethod: 'google',
    timestamp: new Date().toISOString()
  };

  localStorage.setItem('wedinvite_user', JSON.stringify(user));
  showToast('✅ Berhasil masuk dengan Google!', 'success');
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1200);
}

// ===== REDIRECT HELPER =====
function getRedirectUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('redirect') || 'dashboard.html';
}

function redirectAfterAuth() {
  const redirect = getRedirectUrl();
  window.location.href = redirect;
}

// ===== CHECK EXISTING SESSION =====
window.addEventListener('DOMContentLoaded', () => {
  const user = localStorage.getItem('wedinvite_user');
  if (user) {
    const u = JSON.parse(user);
    // Show user card
    document.getElementById('userCard').classList.add('show');
    document.getElementById('userAvatar').src = u.avatar;
    document.getElementById('userName').textContent = u.name;
    document.getElementById('userEmail').textContent = u.email;

    // Auto redirect after showing welcome back
    showToast('👋 Selamat datang kembali, ' + u.name.split(' ')[0] + '!', 'success');
    setTimeout(() => {
      redirectAfterAuth();
    }, 1500);
  }
});
</script>

</body>
</html>
