<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bagikan Undangan — WedInvite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0a0a1a; --navy-light:#141428; --navy-mid:#1e1e3f;
  --gold:#c9a96e; --gold-light:#e8d5b0; --gold-bright:#f0d78c;
  --cream:#faf7f2; --white:#fff; --gray:#8a8a9a; --gray-light:#e8e8ee;
  --success:#22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; }

.topbar { background:var(--navy-light); border-bottom:1px solid rgba(201,169,110,.1); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.topbar-back { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--white); font-size:14px; font-weight:600; transition:color .3s; }
.topbar-back:hover { color:var(--gold); }
.topbar-back svg { width:20px; height:20px; }
.topbar-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; }

.container { max-width:600px; margin:0 auto; padding:48px 24px 80px; }
.header { text-align:center; margin-bottom:40px; }
.header-label { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.header-title { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; margin-bottom:8px; }
.header-subtitle { font-size:15px; color:var(--gray); }

.link-card { background:var(--navy-light); border:1px solid rgba(201,169,110,.15); border-radius:20px; padding:28px; margin-bottom:24px; }
.link-card-label { font-size:12px; color:var(--gray); margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
.link-card-url { font-size:14px; color:var(--white); background:var(--navy); padding:14px 16px; border-radius:12px; border:1px solid rgba(255,255,255,.1); font-family:'Courier New',monospace; word-break:break-all; margin-bottom:12px; }
.link-card-btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--gold), #b8944f); color:var(--navy); border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .3s; }
.link-card-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(201,169,110,.3); }

.share-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; margin-bottom:32px; }
.share-item { background:var(--navy-light); border:1px solid rgba(201,169,110,.1); border-radius:16px; padding:20px; text-align:center; cursor:pointer; transition:all .3s; }
.share-item:hover { border-color:rgba(201,169,110,.3); transform:translateY(-4px); }
.share-item-icon { font-size:28px; margin-bottom:8px; }
.share-item-label { font-size:12px; color:var(--gray); font-weight:500; }

.qr-section { text-align:center; }
.qr-box { width:200px; height:200px; background:var(--white); border-radius:16px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; padding:16px; }
.qr-box svg { width:100%; height:100%; }
.qr-label { font-size:14px; color:var(--gray); }

.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--navy-light); color:var(--gold); padding:14px 28px; border-radius:12px; font-size:14px; font-weight:700; z-index:300; opacity:0; transition:all .4s; box-shadow:0 8px 30px rgba(0,0,0,.3); border:1px solid rgba(201,169,110,.2); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width:640px) {
  .share-grid { grid-template-columns:repeat(2, 1fr); }
  .header-title { font-size:26px; }
}
</style>
</head>
<body>
<script>
function checkAuth() {
  const user = localStorage.getItem('wedinvite_user');
  if (!user) {
    window.location.href = 'auth.html?redirect=share.html';
    return;
  }
}
checkAuth();
</script>


<div class="topbar">
  <a href="dashboard.html" class="topbar-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Dashboard
  </a>
  <div class="topbar-title">Bagikan Undangan</div>
</div>

<div class="container">
  <div class="header">
    <div class="header-label">Sebarkan Kebahagiaan</div>
    <h1 class="header-title">Bagikan Undangan Anda</h1>
    <p class="header-subtitle">Salin link atau bagikan langsung ke media sosial</p>
  </div>

  <div class="link-card">
    <div class="link-card-label">Link Undangan</div>
    <div class="link-card-url" id="inviteUrl">https://wedinvite.id/ican-faiza-2026</div>
    <button class="link-card-btn" onclick="copyLink()">📋 Salin Link</button>
  </div>

  <div class="share-grid">
    <div class="share-item" onclick="shareTo('whatsapp')">
      <div class="share-item-icon">💬</div>
      <div class="share-item-label">WhatsApp</div>
    </div>
    <div class="share-item" onclick="shareTo('instagram')">

    </div>
    <div class="share-item" onclick="shareTo('facebook')">

      <div class="share-item-label">Facebook</div>
    </div>

      <div class="share-item-icon">✉️</div>
      <div class="share-item-label">Email</div>
    </div>
  </div>

  <div class="qr-section">
    <div class="qr-box">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="white"/>
        <rect x="10" y="10" width="25" height="25" fill="#0a0a1a"/>
        <rect x="15" y="15" width="15" height="15" fill="white"/>
        <rect x="18" y="18" width="9" height="9" fill="#0a0a1a"/>
        <rect x="65" y="10" width="25" height="25" fill="#0a0a1a"/>

        <rect x="73" y="18" width="9" height="9" fill="#0a0a1a"/>

        <rect x="18" y="73" width="9" height="9" fill="#0a0a1a"/>
        <rect x="45" y="10" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="20" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="30" width="5" height="5" fill="#0a0a1a"/>
        <rect x="55" y="10" width="5" height="5" fill="#0a0a1a"/>
        <rect x="55" y="25" width="5" height="5" fill="#0a0a1a"/>
        <rect x="10" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="20" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="30" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="55" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="65" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="75" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="85" y="45" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="55" width="5" height="5" fill="#0a0a1a"/>
        <rect x="55" y="55" width="5" height="5" fill="#0a0a1a"/>
        <rect x="65" y="55" width="5" height="5" fill="#0a0a1a"/>
        <rect x="75" y="55" width="5" height="5" fill="#0a0a1a"/>
        <rect x="85" y="55" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="65" width="5" height="5" fill="#0a0a1a"/>
        <rect x="55" y="65" width="5" height="5" fill="#0a0a1a"/>
        <rect x="65" y="65" width="5" height="5" fill="#0a0a1a"/>
        <rect x="75" y="65" width="5" height="5" fill="#0a0a1a"/>
        <rect x="85" y="65" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="75" width="5" height="5" fill="#0a0a1a"/>

        <rect x="85" y="75" width="5" height="5" fill="#0a0a1a"/>
        <rect x="45" y="85" width="5" height="5" fill="#0a0a1a"/>

        <rect x="75" y="85" width="5" height="5" fill="#0a0a1a"/>
        <rect x="85" y="85" width="5" height="5" fill="#0a0a1a"/>
      </svg>
    </div>
    <div class="qr-label">Scan QR code untuk membuka undangan</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function copyLink() {
  navigator.clipboard.writeText(document.getElementById('inviteUrl').textContent);
  showToast('✅ Link undangan disalin!');
}
function shareTo(platform) {
  showToast('✅ Dibagikan ke ' + platform);
}
</script>

</body>
</html>
